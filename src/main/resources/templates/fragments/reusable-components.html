<html xmlns:th="http://www.thymeleaf.org">
<div th:fragment="navbar">
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand">Hobby Collection</a>
            <form class="d-flex">
                <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                <button class="btn btn-success" type="submit">Search</button>
            </form>
        </div>
    </nav>
</div>

<div th:fragment="viewcollectioncard">
    <div class="card" style="width: 18rem;border-style: solid;border-width: medium;border-color: grey;">
        <img src="https://s3.drafthouse.com/ui/sidebar-placeholder-blank.png" class="card-img-top" alt="placeholder image">
        <div class="card-body text-dark">
            <h5 class="card-title">Collection title</h5>
            <p class="card-text">Sample text for the collection description</p>
            <a href="#" class="btn btn-primary">View Collection</a>
        </div>
    </div>
</div>

<div th:fragment="itemcard">
    <div class="card" style="width: 18rem;border-style: solid;border-width: medium;border-color: grey;">
        <img class="card-img-top" src="https://s3.drafthouse.com/ui/sidebar-placeholder-blank.png" alt="placeholder image">
        <div class="card-body text-dark">
            <h5 class="card-title">Item title</h5>
            <p class="card-text">Sample text for the item description</p>
            <a href="#" class="btn btn-primary" data-toggle="modal" data-target="#editItemModal">Edit Item</a>
        </div>
    </div>
    <!-- Edit Item Modal Section -->
    <div class="modal fade" id="editItemModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLongTitle">Edit Item</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="custom-file">
                        <img src="https://s3.drafthouse.com/ui/sidebar-placeholder-blank.png" alt="placeholder image">
                        <form>
                            <div class="form-group">
                                <label for="formCollectionName">Name</label>
                                <input type="text" class="form-control" id="formCollectionName" placeholder="Enter a Name">
                            </div>
                            <div class="form-group">
                                <label for="formCollectionDescription">Description</label>
                                <input type="text" class="form-control" id="formCollectionDescription" placeholder="Enter a Description">
                            </div>
                            <div class="form-group">
                                <label for="formCollectionDescription">Tags</label>
                                <input type="text" class="form-control" id="formCollectionTags" placeholder="Enter Tags">
                            </div>
                            <div class="custom-file">
                                <label class="custom-file-label" for="customFile">Choose a Picture</label><br>
                                <input type="file" class="custom-file-input" id="customFile">
                            </div>
                        </form>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
