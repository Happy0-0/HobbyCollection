<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <link rel="icon" href="https://www.shareicon.net/data/2017/01/18/872963_game_512x512.png">
    <title>Hobby Collection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js" integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0" crossorigin="anonymous"></script>
</head>
<body>
    <div th:replace="fragments/reusable-components :: navbar"></div>
    <p style="padding-bottom:1%"></p>

    <div class="container">
        <h2>Browse Collection</h2>
        <div class="row row-cols-auto">
            <div class="col">
                <div class="card" style="width: 18rem;border-style: solid;border-width: medium;border-color: grey;">
                    <div class="card-body text-dark">
                        <h5 class="card-title">Add a new item</h5>
                        <p class="card-text">Click below to add a new item to the current collection</p>
                        <a href="#" class="btn btn-primary" data-toggle="modal" data-target="#addItemModal">Edit Item</a>
                    </div>
                </div>
            </div>
            <div class="col">
                <div th:replace="fragments/reusable-components :: itemcard">
                </div>
            </div>
            <div class="col">
                <div th:replace="fragments/reusable-components :: itemcard">
                </div>
            </div>
            <div class="col">
                <div th:replace="fragments/reusable-components :: itemcard">
                </div>
            </div>
            <div class="col">
                <div th:replace="fragments/reusable-components :: itemcard">
                </div>
            </div>
        </div>
        <p style="padding:1%"></p>
    </div>
    <!-- Add Item Card Modal Section -->
    <div class="modal fade" id="addItemModal" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addItemModalTitle">Add a new Item</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="custom-file">
                        <form>
                            <div class="form-group">
                                <label for="formItemName">Name</label>
                                <input type="text" class="form-control" id="formItemName" placeholder="Enter a Name">
                            </div>
                            <div class="form-group">
                                <label for="formItemDescription">Description</label>
                                <input type="text" class="form-control" id="formItemDescription" placeholder="Enter a Description">
                            </div>
                            <div class="form-group">
                                <label for="formItemTag">Tags</label>
                                <input type="text" class="form-control" id="formItemTag" placeholder="Enter Tags">
                            </div>
                            <div class="custom-file">
                                <label class="custom-file-label" for="customItemFile">Choose a Picture</label><br>
                                <input type="file" class="custom-file-input" id="customItemFile">
                            </div>
                        </form>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary">Save changes</button>
                </div>
            </div>
        </div>
    </div>
</body>
<footer>
    <div class="text-center p-3" style="background-color:#0082C4">
        © 2021 Copyright:
        <a class="text-dark" href="/">HobbyCollection</a>
    </div>
</footer>
</html>
